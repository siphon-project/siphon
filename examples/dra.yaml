# SIPhon Diameter Routing Agent (DRA) configuration.
#
# A DRA accepts inbound Diameter from authenticated peers (MME, IP-SM-GW, …),
# and relays each request to a backend peer chosen by the dispatch script
# (examples/dra.py) from the per-tenant routing table below.
#
# Usage:
#   siphon --config examples/dra.yaml
#
# Identity is per-tenant (under diameter.tenants.<name>.identity), selected at
# CER time by the source-IP → tenant ACL — there is no single global origin.

# The DRA does not process SIP; this listener is unused but required by the
# config schema. Point it at an unused loopback port.
listen:
  udp:
    - "127.0.0.1:5099"

# Required by the config schema; the DRA routes on Diameter realms, not SIP.
domain:
  local:
    - "epc.mnc001.mcc001.3gppnetwork.org"

script:
  path: "examples/dra.py"
  reload: auto

diameter:
  # Inbound listeners — presence enables server (DRA) mode.
  listen:
    tcp: "0.0.0.0:3868"
    sctp: "0.0.0.0:3868"

  # Generic event sink for Python-emitted signalling events.
  event_sink:
    backend: file
    file:
      path: "/var/log/siphon/dra-events.jsonl"

  # Multi-tenant identity + per-tenant peer tables + opaque routes.
  # `routes` is consumed by the Python dispatch script, not by siphon.
  tenants:
    default:
      identity:
        origin_host: "dra.epc.mnc001.mcc001.3gppnetwork.org"
        origin_realm: "epc.mnc001.mcc001.3gppnetwork.org"
      clients:
        - name: ip-sm-gw
          allowed_ips: ["172.16.0.150"]
          expected_origin_host: "ip-sm-gw.epc.mnc001.mcc001.3gppnetwork.org"
        - name: mme
          allowed_ips: ["172.16.0.152", "172.16.0.0/24"]
      servers:
        - { name: hss,  host: "172.16.0.61", port: 3868, transport: tcp }
        - { name: pcrf, host: "172.16.0.71", port: 3868, transport: tcp }
      routes:
        - { application: s6a, destinations: ["hss"] }   # MME → HSS (LTE attach/auth)
        - { application: s6c, destinations: ["hss"] }
        - { application: rx,  destinations: ["pcrf"] }
        - { application: cx,  destinations: ["hss"] }
