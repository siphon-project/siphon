# siphon.test.yaml — test configuration for SIPp functional tests
#
# Used with: sipp/docker-compose.yaml
# Script:    scripts/proxy_default.py
# Auth:      static credentials (alice/secret, bob/secret)

listen:
  udp:
    - "0.0.0.0:5060"
  tcp:
    - "0.0.0.0:5060"

domain:
  local:
    - "siphon.test"
    - "172.20.0.10"
    - "127.0.0.1"

script:
  path: "scripts/proxy_default.py"
  reload: auto

registrar:
  backend: memory
  default_expires: 3600
  max_expires: 7200

auth:
  realm: "siphon.test"
  backend: static
  users:
    alice: "secret"
    bob: "secret"

log:
  level: debug
  format: pretty
