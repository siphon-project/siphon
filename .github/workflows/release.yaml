# .github/workflows/release.yaml — Build, package, and publish on tag push
name: Release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: write
  packages: write

jobs:
  # ── Build release binary + packages ────────────────────────────────────
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.14 (free-threaded)
        uses: deadsnakes/action@v3.2.0
        with:
          python-version: "3.14-dev"

      - name: Install system dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libsctp-dev
          if [ "${{ matrix.target }}" = "aarch64-unknown-linux-gnu" ]; then
            sudo apt-get install -y gcc-aarch64-linux-gnu
          fi

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: PYO3_PYTHON=python3.14 cargo build --release --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Build .deb package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo install cargo-deb
          PYO3_PYTHON=python3.14 cargo deb --target ${{ matrix.target }} --no-build

      - name: Build .rpm package
        if: matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          cargo install cargo-generate-rpm
          cargo generate-rpm --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          ARCHIVE="siphon-${{ github.ref_name }}-${{ matrix.target }}.tar.gz"
          tar czf "$ARCHIVE" \
            -C target/${{ matrix.target }}/release siphon \
            --transform='s,^,siphon-${{ github.ref_name }}/,' \
            -C "${{ github.workspace }}" siphon.yaml scripts/proxy_default.py scripts/b2bua_default.py \
            dist/siphon.service LICENSE README.md
          echo "ARCHIVE=$ARCHIVE" >> "$GITHUB_ENV"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE }}
            target/${{ matrix.target }}/debian/*.deb
            target/${{ matrix.target }}/generate-rpm/*.rpm

  # ── Publish to crates.io ───────────────────────────────────────────────
  crates-io:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Install Python 3.14 (free-threaded)
        uses: deadsnakes/action@v3.2.0
        with:
          python-version: "3.14-dev"

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libsctp-dev

      - uses: dtolnay/rust-toolchain@stable

      - name: Publish to crates.io
        run: PYO3_PYTHON=python3.14 cargo publish
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  # ── Publish Python SDK to PyPI ────────────────────────────────────────
  pypi:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Build and publish siphon-sdk
        run: |
          pip install build twine
          cd sdk && python -m build
          twine upload dist/*
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_TOKEN }}

  # ── Docker image → GHCR ───────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ── GitHub Release with artifacts ──────────────────────────────────────
  github-release:
    runs-on: ubuntu-latest
    needs: [build, crates-io, pypi, docker]
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.deb
            artifacts/*.rpm
